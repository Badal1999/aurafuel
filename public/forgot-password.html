<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>⚡ auraFuel · Forgot Password</title>
    <style>
        :root {
            --bg: #ffffff; --surface: #fafafa; --border: #e5e5e5;
            --text-primary: #1a1a1a; --text-secondary: #8c8c8c; --text-tertiary: #b0b0b0;
            --cta: #000000; --error: #ef4444; --success: #10b981;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04); --shadow-md: 0 6px 16px rgba(0,0,0,0.08);
            --radius-sm: 12px; --radius-md: 16px; --radius-xl: 28px; --radius-full: 999px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', 'Inter', sans-serif; background: #f5f5f5; color: var(--text-primary);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px;
        }
        .app-shell {
            width: 100%; max-width: 420px; min-height: 580px; background: var(--bg);
            border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-md);
            border: 1px solid var(--border); display: flex; flex-direction: column;
        }
        .header {
            display: flex; align-items: center; gap: 10px; padding: 20px 20px 10px;
        }
        .back-btn {
            width: 34px; height: 34px; border-radius: 50%; background: var(--surface);
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px; text-decoration: none; color: var(--text-primary);
        }
        .page-title { font-size: 17px; font-weight: 700; }
        .form-section { flex: 1; padding: 20px 24px 30px; display: flex; flex-direction: column; }
        .form-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
        .form-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
        .input-field {
            width: 100%; padding: 13px 14px; border-radius: var(--radius-sm);
            border: 1px solid var(--border); background: var(--surface); font-size: 15px; outline: none;
        }
        .btn {
            width: 100%; padding: 14px; border-radius: var(--radius-full); font-size: 14px;
            font-weight: 600; cursor: pointer; border: none; font-family: inherit; margin-top: 10px;
        }
        .btn-primary { background: var(--cta); color: #fff; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .error-msg { font-size: 11px; color: var(--error); margin-top: 4px; display: none; }
        .error-msg.show { display: block; }
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--success); color: #fff; padding: 10px 22px; border-radius: var(--radius-full);
            font-size: 13px; font-weight: 600; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
        .toast.error { background: var(--error); }
    </style>
</head>
<body>
<div class="app-shell">
    <header class="header">
        <a href="login.html" class="back-btn">←</a>
        <span class="page-title">Forgot Password</span>
    </header>
    <div class="form-section">
        <h1 class="form-title">Reset Password 🔐</h1>
        <p class="form-subtitle">Enter your email to receive a reset OTP</p>

        <div class="input-group">
            <label class="input-label">Email Address</label>
            <input type="email" class="input-field" id="emailInput" placeholder="you@example.com" autocomplete="email">
        </div>

        <div id="otpSection" style="display:none;">
            <div class="input-group">
                <label class="input-label">OTP</label>
                <input type="text" class="input-field" id="otpInput" placeholder="Enter 6-digit OTP" maxlength="6">
                <p class="error-msg" id="otpError">Invalid OTP</p>
            </div>
            <div class="input-group">
                <label class="input-label">New Password</label>
                <input type="password" class="input-field" id="newPasswordInput" placeholder="Min. 6 characters">
                <p class="error-msg" id="passwordError">Password must be at least 6 characters</p>
            </div>
        </div>

        <button class="btn btn-primary" id="actionBtn">Send OTP</button>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
    const emailInput = document.getElementById('emailInput');
    const otpSection = document.getElementById('otpSection');
    const otpInput = document.getElementById('otpInput');
    const newPasswordInput = document.getElementById('newPasswordInput');
    const actionBtn = document.getElementById('actionBtn');
    const toast = document.getElementById('toast');

    let step = 1; // 1: send OTP, 2: verify & reset

    function showToast(msg, isError = false) {
        toast.textContent = msg;
        toast.className = 'toast' + (isError ? ' error' : '');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    actionBtn.addEventListener('click', async () => {
        const email = emailInput.value.trim();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showToast('Please enter a valid email', true);
            return;
        }

        if (step === 1) {
            // Send OTP
            actionBtn.disabled = true;
            actionBtn.textContent = 'Sending...';
            try {
                const res = await fetch('http://localhost:5000/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (res.ok) {
                    showToast('✅ OTP sent to your email');
                    otpSection.style.display = 'block';
                    actionBtn.textContent = 'Reset Password';
                    step = 2;
                } else {
                    showToast(data.message || 'Error', true);
                }
            } catch (err) { showToast('Network error', true); }
            actionBtn.disabled = false;
        } else {
            // Reset password
            const otp = otpInput.value.trim();
            const newPassword = newPasswordInput.value.trim();
            if (otp.length !== 6) {
                document.getElementById('otpError').classList.add('show');
                return;
            }
            if (newPassword.length < 6) {
                document.getElementById('passwordError').classList.add('show');
                return;
            }
            actionBtn.disabled = true;
            actionBtn.textContent = 'Resetting...';
            try {
                const res = await fetch('http://localhost:5000/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp, newPassword })
                });
                const data = await res.json();
                if (res.ok) {
                    showToast('✅ Password reset! Redirecting to login...');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showToast(data.message || 'Error', true);
                }
            } catch (err) { showToast('Network error', true); }
            actionBtn.disabled = false;
        }
    });

    otpInput.addEventListener('input', () => document.getElementById('otpError').classList.remove('show'));
    newPasswordInput.addEventListener('input', () => document.getElementById('passwordError').classList.remove('show'));
</script>
</body>
</html>

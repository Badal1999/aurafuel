<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>⚡ auraFuel · Profile</title>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #fafafa;
            --border: #e5e5e5;
            --text-primary: #1a1a1a;
            --text-secondary: #8c8c8c;
            --text-tertiary: #b0b0b0;
            --cta: #000000;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 6px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 28px rgba(0,0,0,0.12);
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --radius-full: 999px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f5f5f5;
            color: var(--text-primary);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 16px;
            -webkit-font-smoothing: antialiased;
        }
        .app-shell {
            width: 100%; max-width: 420px; height: 720px;
            background: var(--bg); border-radius: var(--radius-xl);
            overflow: hidden; box-shadow: var(--shadow-lg);
            border: 1px solid var(--border); display: flex; flex-direction: column;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 20px 14px 20px; flex-shrink: 0;
        }
        .back-btn {
            width: 34px; height: 34px; border-radius: 50%; background: var(--surface);
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px; text-decoration: none; color: var(--text-primary);
        }
        .page-title { font-size: 17px; font-weight: 700; }
        .header-spacer { width: 34px; }

        .main-content { flex: 1; overflow-y: auto; padding: 10px 18px 20px 18px; }

        .profile-header { text-align: center; margin-bottom: 20px; }
        .avatar-lg {
            width: 70px; height: 70px; border-radius: 50%; background: var(--cta); color: #fff;
            display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 700;
            margin: 0 auto 10px;
        }
        .profile-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .profile-email { font-size: 13px; color: var(--text-secondary); }

        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 14px; margin-bottom: 16px;
        }
        .card-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--text-secondary); }
        .info-value { font-weight: 600; }

        .progress-bar-bg { height: 6px; background: var(--border); border-radius: 6px; overflow: hidden; margin-top: 8px; }
        .progress-bar-fill { height: 100%; background: var(--cta); border-radius: 6px; width: 0%; transition: width 0.4s ease; }

        .weight-history .weight-item {
            display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;
        }
        .weight-item:last-child { border-bottom: none; }
        .weight-date { color: var(--text-secondary); }
        .weight-kg { font-weight: 600; }

        .logout-btn {
            width: 100%; padding: 14px; border-radius: var(--radius-full);
            font-size: 14px; font-weight: 600; cursor: pointer;
            background: var(--error); color: #fff; border: none; font-family: inherit; margin-top: 10px;
        }

        .bottom-nav {
            display: flex; justify-content: space-around; align-items: center;
            padding: 8px 16px 14px 16px; border-top: 1px solid var(--border); background: var(--bg);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            cursor: pointer; color: var(--text-tertiary); font-size: 10px; font-weight: 500;
            text-decoration: none;
        }
        .nav-item.active { color: var(--text-primary); font-weight: 600; }
        .nav-icon { font-size: 20px; }

        @media (max-width: 380px) {
            .card { padding: 10px; }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <header class="header">
        <a href="dashboard.html" class="back-btn">←</a>
        <span class="page-title">👤 Profile</span>
        <div class="header-spacer"></div>
    </header>
    <div class="main-content">
        <div class="profile-header">
            <div class="avatar-lg" id="profileAvatar">S</div>
            <div class="profile-name" id="profileName">Loading...</div>
            <div class="profile-email" id="profileEmail">—</div>
        </div>

        <div class="card">
            <div class="card-title">🎯 Goal & Body Stats</div>
            <div class="info-row">
                <span class="info-label">Goal</span>
                <span class="info-value" id="goalDisplay">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Age</span>
                <span class="info-value" id="ageDisplay">— years</span>
            </div>
            <div class="info-row">
                <span class="info-label">Weight</span>
                <span class="info-value" id="weightDisplay">— kg</span>
            </div>
            <div class="info-row">
                <span class="info-label">Daily Target</span>
                <span class="info-value" id="dailyTargetDisplay">— kcal</span>
            </div>
            <div class="card-title" style="margin-top:12px;">📈 Goal Progress</div>
            <div class="info-row">
                <span class="info-label">Start Weight</span>
                <span class="info-value" id="startWeightDisplay">— kg</span>
            </div>
            <div class="info-row">
                <span class="info-label">Current Weight</span>
                <span class="info-value" id="currentWeightDisplay">— kg</span>
            </div>
            <div class="info-row">
                <span class="info-label">Target Weight</span>
                <span class="info-value" id="targetWeightDisplay">— kg</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="goalProgressBar" style="width:0%;"></div>
            </div>
            <div style="font-size:10px; color:var(--text-secondary); margin-top:4px;" id="goalProgressText">0% achieved</div>
        </div>

        <div class="card">
            <div class="card-title">⚖️ Weight History <span style="font-size:11px; font-weight:400; color:var(--text-secondary);">(last 10 entries)</span></div>
            <div class="weight-history" id="weightHistoryContainer">
                <div class="weight-item"><span class="weight-date">—</span><span class="weight-kg">— kg</span></div>
            </div>
        </div>

        <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
        <a href="progress.html" class="nav-item"><span class="nav-icon">📊</span><span>Progress</span></a>
        <a href="profile.html" class="nav-item active"><span class="nav-icon">👤</span><span>Profile</span></a>
    </div>
</div>

<script>
    (async function() {
        const currentUser = JSON.parse(localStorage.getItem('aurafuel_currentUser') || sessionStorage.getItem('aurafuel_currentUser'));
        if (!currentUser) { window.location.href = 'login.html'; return; }
        const token = localStorage.getItem('aurafuel_token') || sessionStorage.getItem('aurafuel_token');
        const apiBase = '';

        const firstName = currentUser.fullName?.split(' ')[0] || 'User';
        document.getElementById('profileName').textContent = firstName;
        document.getElementById('profileEmail').textContent = currentUser.email || '—';
        document.getElementById('profileAvatar').textContent = firstName.charAt(0).toUpperCase();

        try {
            const [userRes, weightRes, mealsRes] = await Promise.all([
                fetch(`${apiBase}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } }),
                fetch(`${apiBase}/api/weight`, { headers: { 'Authorization': `Bearer ${token}` } }),
                fetch(`${apiBase}/api/meals/today`, { headers: { 'Authorization': `Bearer ${token}` } })
            ]);

            const userData = await userRes.json();
            const weightData = await weightRes.json();
            const mealsData = await mealsRes.json();

            const user = userData.user || currentUser;
            const goalMap = { weight_loss: 'Fat Loss', muscle_gain: 'Muscle Gain', maintenance: 'Maintenance' };
            document.getElementById('goalDisplay').textContent = goalMap[user.goal] || '—';
            document.getElementById('ageDisplay').textContent = (user.age || '—') + ' years';
            document.getElementById('weightDisplay').textContent = (user.weight || '—') + ' kg';

            // ---- ACTUAL DAILY TARGET FROM TODAY'S MEALS ----
            const todayMeals = mealsData.meals || [];
            let actualDailyTarget = 0;
            todayMeals.forEach(meal => {
                actualDailyTarget += meal.totalCalories || 0;
            });

            if (actualDailyTarget > 0) {
                document.getElementById('dailyTargetDisplay').textContent = actualDailyTarget.toLocaleString() + ' kcal';
            } else {
                // Fallback to BMR calculation
                const age = user.age || 25;
                const weight = user.weight || 75;
                const height = 165;
                let bmr;
                if (user.gender === 'male') bmr = Math.round(10*weight + 6.25*height - 5*age + 5);
                else bmr = Math.round(10*weight + 6.25*height - 5*age - 161);
                let dailyTarget;
                if (user.goal === 'weight_loss') dailyTarget = bmr - 500;
                else if (user.goal === 'muscle_gain') dailyTarget = bmr + 500;
                else dailyTarget = bmr;
                document.getElementById('dailyTargetDisplay').textContent = dailyTarget.toLocaleString() + ' kcal';
            }

            // Weight history & goal progress (same as before)
            const logs = weightData.logs || [];
            const sortedLogs = logs.sort((a,b) => new Date(a.date) - new Date(b.date));
            let startWeight = user.weight || (sortedLogs.length > 0 ? sortedLogs[0].weight : 75);
            const currentWeight = user.weight || startWeight;
            let targetWeight = currentWeight;
            if (user.goal === 'weight_loss') targetWeight = startWeight - 5;
            else if (user.goal === 'muscle_gain') targetWeight = startWeight + 5;
            else targetWeight = startWeight;

            document.getElementById('startWeightDisplay').textContent = startWeight + ' kg';
            document.getElementById('currentWeightDisplay').textContent = currentWeight + ' kg';
            document.getElementById('targetWeightDisplay').textContent = targetWeight + ' kg';

            const totalChange = Math.abs(targetWeight - startWeight);
            let progressPercent = 0;
            if (totalChange > 0) {
                const currentChange = Math.abs(currentWeight - startWeight);
                progressPercent = Math.min(100, Math.round((currentChange / totalChange) * 100));
            }
            document.getElementById('goalProgressBar').style.width = progressPercent + '%';
            document.getElementById('goalProgressText').textContent = progressPercent + '% of goal achieved';

            const historyContainer = document.getElementById('weightHistoryContainer');
            historyContainer.innerHTML = '';
            if (sortedLogs.length === 0) {
                historyContainer.innerHTML = '<div class="weight-item"><span class="weight-date">No entries yet</span><span class="weight-kg">—</span></div>';
            } else {
                const recentLogs = sortedLogs.slice(-10).reverse();
                recentLogs.forEach(log => {
                    const dateStr = new Date(log.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                    const div = document.createElement('div');
                    div.className = 'weight-item';
                    div.innerHTML = `<span class="weight-date">${dateStr}</span><span class="weight-kg">${log.weight} kg</span>`;
                    historyContainer.appendChild(div);
                });
            }

            currentUser.age = user.age;
            currentUser.weight = user.weight;
            currentUser.goal = user.goal;
            localStorage.setItem('aurafuel_currentUser', JSON.stringify(currentUser));

        } catch (err) {
            console.error('Failed to load profile data:', err);
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (confirm('Logout?')) {
                localStorage.removeItem('aurafuel_currentUser');
                sessionStorage.removeItem('aurafuel_currentUser');
                window.location.href = 'login.html';
            }
        });
    })();
</script>
</body>
</html>

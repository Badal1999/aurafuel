<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>⚡ auraFuel · Sign Up</title>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #fafafa;
            --border: #e5e5e5;
            --text-primary: #1a1a1a;
            --text-secondary: #8c8c8c;
            --text-tertiary: #b0b0b0;
            --cta: #000000;
            --error: #ef4444;
            --success: #10b981;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 6px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 28px rgba(0, 0, 0, 0.12);
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --radius-full: 999px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f5f5f5;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }
        .app-shell {
            width: 100%;
            max-width: 420px;
            min-height: 720px;
            background: var(--bg);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 20px 16px 20px;
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 3px;
            text-decoration: none;
        }
        .logo-icon {
            font-size: 26px;
            color: var(--cta);
            animation: boltPulse 2.5s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes boltPulse {
            0%,
            100% {
                transform: scale(1) rotate(-5deg);
            }
            50% {
                transform: scale(1.12) rotate(-2deg);
            }
        }
        .logo-text {
            font-size: 19px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.4px;
            line-height: 1;
        }
        .logo-text .thin {
            font-weight: 300;
            color: var(--text-secondary);
        }
        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-full);
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-primary);
            text-decoration: none;
        }
        .form-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px 24px 30px 24px;
            overflow-y: auto;
        }
        .form-header {
            margin-bottom: 22px;
        }
        .form-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .form-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .form-subtitle a {
            color: var(--cta);
            text-decoration: none;
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 16px;
            position: relative;
        }
        .input-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }
        .input-field {
            width: 100%;
            padding: 13px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface);
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            outline: none;
            font-family: inherit;
        }
        .input-field:focus {
            border-color: var(--cta);
            background: var(--bg);
        }
        .input-field::placeholder {
            color: var(--text-tertiary);
        }
        .input-icon {
            position: absolute;
            right: 14px;
            top: 36px;
            font-size: 16px;
            color: var(--text-tertiary);
            pointer-events: none;
        }
        .input-icon.clickable {
            pointer-events: auto;
            cursor: pointer;
        }
        .two-col {
            display: flex;
            gap: 10px;
        }
        .two-col .input-group {
            flex: 1;
        }
        .gender-selector {
            display: flex;
            gap: 8px;
        }
        .gender-option {
            flex: 1;
            padding: 12px 8px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface);
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .gender-option.selected {
            background: var(--cta);
            color: #fff;
            border-color: var(--cta);
        }
        .goal-selector {
            display: flex;
            gap: 8px;
        }
        .goal-option {
            flex: 1;
            padding: 12px 6px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface);
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .goal-option.selected {
            background: var(--cta);
            color: #fff;
            border-color: var(--cta);
        }
        .goal-emoji {
            display: block;
            font-size: 20px;
            margin-bottom: 3px;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            border-radius: var(--radius-full);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background: var(--cta);
            color: #fff;
            border: none;
            margin-top: 8px;
            font-family: inherit;
        }
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .error-msg {
            font-size: 11px;
            color: var(--error);
            margin-top: 4px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: #fff;
            padding: 12px 24px;
            border-radius: var(--radius-full);
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="header">
            <a href="index.html" class="logo-section">
                <span class="logo-icon">⚡</span>
                <span class="logo-text"><span class="thin">aura</span>Fuel</span>
            </a>
            <a href="index.html" class="back-btn">←</a>
        </header>
        <main class="form-section">
            <div class="form-header">
                <h1 class="form-title">Create Account</h1>
                <p class="form-subtitle">Already have an account? <a href="login.html">Log In</a></p>
            </div>
            <div class="input-group">
                <label class="input-label">Full Name</label>
                <input type="text" class="input-field" id="fullName" placeholder="Enter your full name" autocomplete="name">
                <span class="input-icon">👤</span>
                <p class="error-msg" id="nameError">Please enter your full name</p>
            </div>
            <div class="two-col">
                <div class="input-group">
                    <label class="input-label">Gender</label>
                    <div class="gender-selector" id="genderSelector">
                        <div class="gender-option selected" data-gender="female">♀️ Female</div>
                        <div class="gender-option" data-gender="male">♂️ Male</div>
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label">Mobile No.</label>
                    <input type="tel" class="input-field" id="mobileNumber" placeholder="9876543210" maxlength="10" inputmode="numeric">
                    <p class="error-msg" id="mobileError">Enter valid 10-digit number</p>
                </div>
            </div>
            <div class="input-group">
                <label class="input-label">Email Address</label>
                <input type="email" class="input-field" id="email" placeholder="you@example.com" autocomplete="email">
                <span class="input-icon">✉️</span>
                <p class="error-msg" id="emailError">Please enter a valid email</p>
            </div>
            <div class="input-group">
                   <label class="input-label">Verify Email</label>
                   <div style="display:flex; gap:8px;">
                   <input type="text" class="input-field" id="otpInput" placeholder="Enter OTP" maxlength="6" style="flex:1;" disabled>
                   <button type="button" id="sendOtpBtn" style="padding:12px 14px; border-radius:12px; background:var(--cta); color:#fff; border:none; cursor:pointer; font-weight:600;">Send OTP</button>
            </div>
    <p class="error-msg" id="otpError">Invalid OTP</p>
</div>
            <div class="input-group">
                <label class="input-label">Password</label>
                <input type="password" class="input-field" id="password" placeholder="Min. 6 characters" autocomplete="new-password">
                <span class="input-icon clickable" id="passwordToggle">👁️</span>
                <p class="error-msg" id="passwordError">Password must be at least 6 characters</p>
            </div>
            <div class="input-group">
                <label class="input-label">Your Goal</label>
                <div class="goal-selector" id="goalSelector">
                    <div class="goal-option selected" data-goal="weight_loss"><span class="goal-emoji">🏃‍♀️</span>Weight Loss</div>
                    <div class="goal-option" data-goal="maintenance"><span class="goal-emoji">⚖️</span>Maintenance</div>
                    <div class="goal-option" data-goal="muscle_gain"><span class="goal-emoji">💪</span>Muscle Gain</div>
                </div>
            </div>
            <button class="submit-btn" id="submitBtn">⚡ Create Account</button>
        </main>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        const mobileInput = document.getElementById('mobileNumber');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const nameError = document.getElementById('nameError');
        const emailError = document.getElementById('emailError');
        const mobileError = document.getElementById('mobileError');
        const passwordError = document.getElementById('passwordError');
        const passwordToggle = document.getElementById('passwordToggle');
        const toast = document.getElementById('toast');

        let selectedGender = 'female';
        let selectedGoal = 'weight_loss';
        let otpSent = false;

        document.querySelectorAll('#genderSelector .gender-option').forEach(o => o.addEventListener('click', function() {
            document.querySelectorAll('#genderSelector .gender-option').forEach(x => x.classList.remove('selected'));
            this.classList.add('selected');
            selectedGender = this.dataset.gender;
        }));

        document.querySelectorAll('#goalSelector .goal-option').forEach(o => o.addEventListener('click', function() {
            document.querySelectorAll('#goalSelector .goal-option').forEach(x => x.classList.remove('selected'));
            this.classList.add('selected');
            selectedGoal = this.dataset.goal;
        }));

        passwordToggle.addEventListener('click', function() {
            passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
            this.textContent = passwordInput.type === 'password' ? '👁️' : '🙈';
        });

        mobileInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 10);
            mobileError.classList.remove('show');
        });
        mobileInput.addEventListener('keypress', function(e) {
            if (!/^\d$/.test(e.key) || this.value.replace(/\D/g, '').length >= 10) e.preventDefault();
        });

        fullNameInput.addEventListener('input', () => nameError.classList.remove('show'));
        emailInput.addEventListener('input', () => emailError.classList.remove('show'));
        passwordInput.addEventListener('input', () => passwordError.classList.remove('show'));

         document.getElementById('sendOtpBtn').addEventListener('click', async () => {
             const email = emailInput.value.trim();
          if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showToast('Please enter a valid email first', false);
                      return;
             }
                  try {
                       const res = await fetch('/api/auth/send-otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
        const data = await res.json();
        if (res.ok) {
            showToast('✅ OTP sent to your email', true);
            otpSent = true;
            document.getElementById('otpInput').disabled = false;
            document.getElementById('otpInput').focus();
            document.getElementById('sendOtpBtn').textContent = 'Resend OTP';
        } else {
            showToast(data.message || 'Failed to send OTP', false);
        }
    } catch (err) {
        showToast('Error sending OTP', false);
    }
});

        function showToast(msg, ok = true) {
            toast.textContent = msg;
            toast.style.background = ok ? 'var(--success)' : 'var(--error)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function validateForm() {
            let valid = true;
            if (fullNameInput.value.trim().length < 2) { nameError.classList.add('show');
                valid = false; }
            if (mobileInput.value.replace(/\D/g, '').length !== 10) { mobileError.classList.add('show');
                valid = false; }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim())) { emailError.classList.add('show');
                valid = false; }
            if (passwordInput.value.length < 6) { passwordError.classList.add('show');
                valid = false; }
            return valid;
        }

        submitBtn.addEventListener('click', function(e) {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Creating...';

            if (!validateForm()) {
                submitBtn.disabled = false;
                submitBtn.textContent = '⚡ Create Account';
                showToast('Please fix the errors above', false);
                return;
            }

            // ---- OTP validation (submitBtn ke andar) ----
if (!otpSent) {
    showToast('Please verify your email with OTP first', false);
    submitBtn.disabled = false;
    submitBtn.textContent = '⚡ Create Account';
    return;
}

const otp = document.getElementById('otpInput').value.trim();
if (otp.length !== 6) {
    document.getElementById('otpError').classList.add('show');
    submitBtn.disabled = false;
    submitBtn.textContent = '⚡ Create Account';
    return;
}

           const userData = {
    fullName: fullNameInput.value.trim(),
    gender: selectedGender,
    mobile: '+91 ' + mobileInput.value.replace(/\D/g, ''),
    email: emailInput.value.trim().toLowerCase(),
    password: passwordInput.value,
    goal: selectedGoal,
    otp: otp   // <-- ye add kiya
};

            // ✅ API CALL TO BACKEND
            fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.token) {
                        localStorage.setItem('aurafuel_token', data.token);
                        localStorage.setItem('aurafuel_currentUser', JSON.stringify(data.user));
                        showToast('✅ Account Created! Redirecting...', true);
                        setTimeout(() => { window.location.href = 'onboarding.html'; }, 1500);
                    } else {
                        showToast(data.message || 'Registration failed', false);
                        submitBtn.disabled = false;
                        submitBtn.textContent = '⚡ Create Account';
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    showToast('Server error. Try again.', false);
                    submitBtn.disabled = false;
                    submitBtn.textContent = '⚡ Create Account';
                });
        });
    </script>
</body>
</html>
